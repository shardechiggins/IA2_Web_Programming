<!-- REGISTER FORM -->
<h2>Register</h2>

<form onsubmit="return validateRegister()">

  <label>Full Name:</label><br>
  <input type="text" id="name" name="name" placeholder="Enter full name"><br><br>

  <label>Date of Birth:</label><br>
  <input type="date" id="dob" name="dob"><br><br>

  <label>Email:</label><br>
  <input type="email" id="email" name="email" placeholder="Enter email"><br><br>

  <label>Username:</label><br>
  <input type="text" id="username" name="username" placeholder="Create username"><br><br>

  <label>Password:</label><br>
  <input type="password" id="password" name="password" placeholder="Create password"><br><br>

  <button type="submit">Register</button>

</form>

<p id="registerError"></p>
